<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AndesNova Chat API</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(90vw, 560px);
        padding: 32px;
        border: 1px solid #d9e1ec;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.5;
      }

      code {
        display: inline-block;
        padding: 6px 8px;
        border-radius: 6px;
        background: #eef3f8;
        color: #0f355e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AndesNova Chat API</h1>
      <p><strong>API active for AndesNova IA+</strong></p>
      <p>Secure backend service for the AndesNova business chatbot.</p>
      <p>Endpoint: <code>POST /api/chat</code></p>
    </main>
  </body>
</html>
